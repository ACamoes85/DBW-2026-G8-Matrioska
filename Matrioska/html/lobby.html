<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrioska - Sala de Jogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/create-match.css"> 
    <link rel="stylesheet" href="../css/lobby.css"> 
</head>
<body class="create-match-page">

    <img src="../images/create-match.png" class="background-image" />

    <a href="create-match.html" class="back-button">
        <span>←</span> <span class="txt-back">Voltar</span>
    </a>

    <main class="central-container">
        <div class="glass-card match-card lobby-card">
            <h1 class="gradient-title">Sala de Jogo</h1>

            <div class="room-code-section lobby-code">
                <label>Código da sala:</label>
                <div class="code-display" id="room-code">X7K9P2</div>
            </div>

            <div class="players-list">
                <div class="player-slot">
                    <div class="avatar-container">
                        <img src="../images/profile1.png" id="main-profile-img" alt="Jogador">
                        <div class="avatar-glow"></div>
                    </div>
                    <div class="player-name-badge">
                        <span id="player-username-display">Nome_Jogador</span>
                    </div>
                </div>

                </div>

            <button class="btn-create-match">Iniciar partida</button>
        </div>
    </main>

    <script src="../js/main.js"></script>
</body>
</html>
