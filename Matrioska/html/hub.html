<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrioska</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand">Hub</div>

        <nav class="menu">
            <a href="#" class="active">Início</a>
            <a href="#">Classificação</a>
            <a href="#">Como jogar</a>
        </nav>

        <div class="avatar">
            <span>👔</span>
        </div>
    </header>

    <main class="page">
        <section class="hero-card">
            <div class="hero-left">
                <h1>Bem-vindo à Matrioska</h1>
                <p>Descobre as palavras escondidas antes que o tempo acabe.</p>

                <div class="actions">
                    <button class="btn btn-primary">Criar partida</button>

                    <form class="join-room">
                        <input type="text" placeholder="Introduzir código da sala" />
                        <button type="submit" class="btn btn-secondary">Entrar</button>
                    </form>
                </div>
            </div>
            <div class="language-switch">
                <span class="flag">🇬🇧</span>
                <span>English</span>
            </div>
        </section>
    </main>
</body>
</html>
