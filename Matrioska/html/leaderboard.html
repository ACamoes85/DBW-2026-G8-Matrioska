<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrioska - Classificação</title>
    
    <!-- Estilos globais e específicos da página leaderboard -->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/leaderboard.css" />
  </head>
  <body>
    <!-- Imagem de fundo -->
    <img src="../images/howtoplay_bg.png" class="background-image" />

    <!-- Botão para voltar atrás -->
    <a href="hub.html" class="back-button"></a>

    <!-- Barra de navegação -->
    <header class="header-navbar">
        <nav class="nav-links">
            <a href="hub.html">Início</a>
            <a href="leaderboard.html" class="active">Classificação</a>
            <a href="howtoplay.html">Como jogar</a>
        </nav>
        <div class="profile-section">
            <a href="profile.html" class="profile-link">
                <img src="../images/profile1.png" alt="Perfil" class="profile-avatar" id="nav-profile-avatar">
            </a>
        </div>
    </header>
    <!-- Conteúdo principal -->
    <main class="leaderboard-page">
      <div class="glass-card leaderboard-card">
        <h1 class="title-neon">Classificação</h1>
         <!-- Tabela -->
        <div class="leaderboard-table">
          <div class="table-header">
            <span>Posição</span>
            <span>Jogador</span>
            <span>Pontuação Total</span>
          </div>

          <div class="table-body">
            <div class="table-row">
              <span>1</span>
              <span>Jogador1</span>
              <span>1000</span>
            </div>
            <div class="table-row">
              <span>2</span>
              <span>Jogador2</span>
              <span>900</span>
            </div>
            <div class="table-row">
              <span>3</span>
              <span>Jogador3</span>
              <span>800</span>
            </div>
            <div class="table-row">
              <span>4</span>
              <span>Jogador4</span>
              <span>700</span>
            </div>
            <div class="table-row">
              <span>5</span>
              <span>Jogador5</span>
              <span>600</span>
            </div>
            <div class="table-row">
              <span>6</span>
              <span>Jogador6</span>
              <span>500</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Script principal -->
    <script src="../js/main.js"></script>
  </body>
</html>
