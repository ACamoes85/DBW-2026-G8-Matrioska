<!doctype html>
<html lang="pt-PT">
  <head>
    <!-- Configuração base -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrioska - Register</title>

    <!-- Fonte -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Estilos -->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>

  <body>
    <!-- Fundo -->
    <img
      src="../images/homepage_bg.png"
      alt="Fundo Matrioska"
      class="background-image"
    />

    <!-- Botão voltar -->
    <a href="homepage.html" class="auth-back" aria-label="Voltar">←</a>

    <!-- Card de registo -->
    <main class="glass-card auth-card">
      <!-- Título -->
      <h1 class="title-neon">Matrioska</h1>

      <!-- Subtítulo -->
      <p class="auth-subtitle" id="register-subtitle">Insere os teus dados</p>

      <!-- Formulário de registo -->
      <form class="auth-form" id="register-form">
        <!-- Email -->
        <input
          type="email"
          class="auth-input"
          id="register-email"
          placeholder="E-mail"
          required
        />

        <!-- Username -->
        <input
          type="text"
          class="auth-input"
          id="register-username"
          placeholder="Nome de utilizador"
          required
        />

        <!-- Password -->
        <input
          type="password"
          class="auth-input"
          id="register-password"
          placeholder="Palavra-passe"
          required
        />

        <!-- Confirmar password -->
        <input
          type="password"
          class="auth-input"
          id="register-confirm-password"
          placeholder="Confirmar palavra-passe"
          required
        />

        <!-- Botão de registo -->
        <button
          type="submit"
          class="auth-submit register-submit"
          id="register-button"
        >
          Registar
        </button>
      </form>

      <!-- Seletor de idioma -->
      <div class="lang-footer" id="lang-selector" onclick="toggleLanguage()">
        <div id="lang-flag" class="lang-icon english-flag"></div>
        <span id="lang-name" class="lang-text">English</span>
      </div>
    </main>

    <!-- Scripts -->
    <script src="../js/main.js"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
