<!doctype html>
<html lang="pt-PT">
  <head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrioska - Homepage</title>

    <!-- Fonte principal do projeto -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Estilos globais e específicos da homepage -->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/homepage.css" />
  </head>

  <body>
    <!-- Imagem de fundo fixa -->
    <img
      src="../images/homepage_bg.png"
      alt="Fundo Matrioska"
      class="background-image"
    />

    <!-- Card principal com efeito glass -->
    <main class="glass-card homepage-card">
      <!-- Texto de boas-vindas (dinâmico via JS) -->
      <p id="welcome-label" class="welcome-label">Bem-vindo ao</p>

      <!-- Título principal -->
      <h1 class="title-neon">Matrioska</h1>

      <!-- Descrição do jogo -->
      <p id="description" class="description">
        Revela o máximo de palavras antes que o tempo se esgote.
      </p>

      <!-- Botões principais de navegação -->
      <div class="btn-container">
        <a href="login.html" id="btn-login" class="btn-custom btn-blue">
          Entrar
        </a>

        <a href="register.html" id="btn-register" class="btn-custom btn-pink">
          Registar
        </a>
      </div>

      <!-- Seletor de idioma -->
      <div class="lang-footer" id="lang-selector" onclick="toggleLanguage()">
        <div id="lang-flag" class="lang-icon english-flag"></div>
        <span id="lang-name" class="lang-text">English</span>
      </div>
    </main>

    <!-- Script principal (idioma + lógica global) -->
    <script src="../js/main.js"></script>
  </body>
</html>
