<!--  PÁGINA INICIAL -->
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrioska - Homepage</title>

    <!-- Fontes e Frameworks externos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ficheiro CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <!-- Imagem de Fundo fixa -->
    <img src="../images/homepage_bg.png" alt="Fundo Matrioska" class="background-image">

    <!-- Bloco principal (Card com efeito de vidro) -->
    <main class="glass-card">
        
        <!-- Texto de introdução  -->
        <p id="welcome-label" class="welcome-label">Bem-vindo ao</p>
        <h1 class="title-neon">Matrioska</h1>
        <p id="description" class="description mx-auto">
            Revela o máximo de palavras antes que o tempo se esgote.
        </p>

        <!-- botões de login e registo -->
        <div class="btn-container">
            <a href="/login" id="btn-login" class="btn-custom btn-blue text-decoration-none">Entrar</a>
            <a href="/registar" id="btn-register" class="btn-custom btn-pink text-decoration-none">Registar</a>
        </div>

        <!-- Seletor de Idioma -->
        <div class="lang-footer" id="lang-selector" onclick="toggleLanguage()">
            <div id="lang-flag" class="lang-icon"></div>
            <span id="lang-name" class="lang-text">English</span>
        </div>

    </main>

    <!-- ficheiro JavaScript -->
    <script src="../js/main.js"></script>

</body>
</html>
