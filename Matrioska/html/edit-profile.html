<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrioska - Alterar Perfil</title>
    
    <!-- Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/edit-profile.css">
</head>
<body class="edit-profile-page">

    <!-- Imagem de fundo -->
    <img src="../images/howtoplay_bg.png" class="background-image" />

    <a href="profile.html" class="back-button">
        <span class="arrow">←</span> <span class="txt-back">Voltar</span>
    </a>

    <!-- Conteúdo principal -->
    <main class="central-card">
        <!-- Imagem de perfil atual -->
        <div class="preview-section">
            <h1 class="edit-title">Imagem de perfil</h1>
            <div class="avatar-preview-wrapper">
                <img src="../images/profile1.png" id="main-preview" alt="Preview">
            </div>
        </div>

        <!-- Seleção da imagem de perfil -->
        <div class="selection-section">
            <h2 class="choose-label">Escolha uma imagem:</h2>
            <div class="avatar-grid">
                <img src="../images/profile1.png" class="grid-item" data-avatar="profile1.png">
                <img src="../images/profile2.png" class="grid-item" data-avatar="profile2.png">
                <img src="../images/profile3.png" class="grid-item" data-avatar="profile3.png">
                <img src="../images/profile4.png" class="grid-item" data-avatar="profile4.png">
                <img src="../images/profile5.png" class="grid-item" data-avatar="profile5.png">
                <img src="../images/profile6.png" class="grid-item" data-avatar="profile6.png">
                <img src="../images/profile7.png" class="grid-item" data-avatar="profile7.png">
                <img src="../images/profile8.png" class="grid-item" data-avatar="profile8.png">
                <img src="../images/profile9.png" class="grid-item" data-avatar="profile9.png">
                <img src="../images/profile10.png" class="grid-item" data-avatar="profile10.png">
                <img src="../images/profile11.png" class="grid-item" data-avatar="profile11.png">
                <img src="../images/profile12.png" class="grid-item" data-avatar="profile12.png">
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/main.js"></script>
    <script src="../js/edit-profile.js"></script>
</body>
</html>
